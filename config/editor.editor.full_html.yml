uuid: 12f518ba-db77-46ff-898f-abda415e39bc
langcode: en
status: true
dependencies:
  config:
    - filter.format.full_html
  module:
    - ckeditor5
format: full_html
editor: ckeditor5
settings:
  toolbar:
    items:
      - bold
      - italic
      - underline
      - strikethrough
      - superscript
      - subscript
      - removeFormat
      - '|'
      - alignment
      - bulletedList
      - numberedList
      - '|'
      - link
      - blockQuote
      - drupalMedia
      - insertTable
      - horizontalLine
      - '-'
      - heading
      - style
      - highlightJs
      - code
      - '|'
      - wproofreader
      - sourceEditing
  plugins:
    ckeditor5_alignment:
      enabled_alignments:
        - center
        - justify
        - left
        - right
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
        - heading4
        - heading5
        - heading6
    ckeditor5_list:
      properties:
        reversed: true
        startIndex: true
        styles: true
      multiBlock: true
    ckeditor5_paste_filter_pasteFilter:
      enabled: true
      filters:
        -
          enabled: true
          weight: -10
          search: '<o:p><\/o:p>'
          replace: ''
        -
          enabled: true
          weight: -9
          search: '(<[^>]*) (style="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -8
          search: '(<[^>]*) (face="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -7
          search: '(<[^>]*) (class="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -6
          search: '(<[^>]*) (valign="[^"]*")'
          replace: $1
        -
          enabled: true
          weight: -5
          search: '<font[^>]*>'
          replace: ''
        -
          enabled: true
          weight: -4
          search: '<\/font>'
          replace: ''
        -
          enabled: true
          weight: -3
          search: '<span[^>]*>'
          replace: ''
        -
          enabled: true
          weight: -2
          search: '<\/span>'
          replace: ''
        -
          enabled: true
          weight: -1
          search: '<p>&nbsp;<\/p>'
          replace: ''
        -
          enabled: true
          weight: 0
          search: '<p><\/p>'
          replace: ''
        -
          enabled: true
          weight: 1
          search: '<b><\/b>'
          replace: ''
        -
          enabled: true
          weight: 2
          search: '<i><\/i>'
          replace: ''
        -
          enabled: true
          weight: 3
          search: '<a name="OLE_LINK[^"]*">(.*?)<\/a>'
          replace: $1
    ckeditor5_sourceEditing:
      allowed_tags: {  }
    ckeditor5_style:
      styles:
        -
          label: 'Left aligned'
          element: '<p class="text-left">'
        -
          label: 'Center aligned'
          element: '<p class="text-center">'
        -
          label: 'Right aligned'
          element: '<p class="text-right">'
        -
          label: Justified
          element: '<p class="text-justify">'
        -
          label: 'No wrap'
          element: '<p class="text-nowrap">'
        -
          label: 'Responsive Table'
          element: '<div class="table-responsive">'
        -
          label: 'Bootstrap Table'
          element: '<table class="table">'
        -
          label: 'Bordered Table'
          element: '<table class="table-bordered">'
        -
          label: 'Hover Table'
          element: '<table class="table-hover">'
        -
          label: 'Small Table'
          element: '<table class="table-sm">'
        -
          label: 'Striped Table'
          element: '<table class="table-striped">'
        -
          label: 'Dark Table'
          element: '<table class="table-dark">'
        -
          label: 'Dark Table Heading'
          element: '<thead class="thead-dark">'
    editor_advanced_link_link:
      enabled_attributes:
        - aria-label
        - class
        - rel
        - target
        - title
    linkit_extension:
      linkit_enabled: true
      linkit_profile: default
    media_media:
      allow_view_mode_override: true
image_upload:
  status: true
  scheme: public
  directory: inline-images
  max_size: null
  max_dimensions:
    width: null
    height: null
