services:
  filefield_paths.redirect:
    class: Drupal\filefield_paths\Redirect
    arguments: ['@entity_type.manager', '@stream_wrapper_manager', '@config.factory', '@logger.channel.filefield_paths']
  Drupal\filefield_paths\RedirectInterface: '@filefield_paths.redirect'
  logger.channel.filefield_paths:
    parent: logger.channel_base
    arguments: ['filefield_paths']
  filefield_paths.batch.updater:
    class: 'Drupal\filefield_paths\Batch\Updater'
    arguments: ['@entity_type.manager']
  Drupal\filefield_paths\Batch\BatchUpdaterInterface: '@filefield_paths.batch.updater'
  Drupal\filefield_paths\Utility\FieldConfigEditFormHandlerInterface:
    class: Drupal\filefield_paths\Utility\FieldConfigEditFormHandler
    autowire: true
  Drupal\filefield_paths\MoveFileProcessorInterface:
    class: Drupal\filefield_paths\MoveFileProcessor
    autowire: true
  Drupal\filefield_paths\PathProcessorInterface:
    class: Drupal\filefield_paths\PathProcessor
    autowire: true

  # Legacy hook support
  Drupal\filefield_paths\Hook\EntityWithFileField:
    class: Drupal\filefield_paths\Hook\EntityWithFileField
    autowire: true
  Drupal\filefield_paths\Hook\FieldConfigEditForm:
    class: Drupal\filefield_paths\Hook\FieldConfigEditForm
    autowire: true
  Drupal\filefield_paths\Hook\FieldWidgetSingleElementForm:
    class: Drupal\filefield_paths\Hook\FieldWidgetSingleElementForm
    autowire: true
  Drupal\filefield_paths\Hook\File:
    class: Drupal\filefield_paths\Hook\File
    autowire: true
  Drupal\filefield_paths\Hook\FileFieldPathsFieldSettingsLegacy:
    class: Drupal\filefield_paths\Hook\FileFieldPathsFieldSettingsLegacy
    autowire: true
  Drupal\filefield_paths\Hook\FileFieldPathsProcessFileLegacy:
    class: Drupal\filefield_paths\Hook\FileFieldPathsProcessFileLegacy
    autowire: true
  Drupal\filefield_paths\Hook\LocalTaskAlter:
    class: Drupal\filefield_paths\Hook\LocalTaskAlter
    autowire: true
  Drupal\filefield_paths\Hook\Tokens:
    class: Drupal\filefield_paths\Hook\Tokens
    autowire: true
